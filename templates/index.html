<!DOCTYPE html>
<html>
<head>
    <title>Face Recognition System using RAG</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #2575fc, #6a11cb);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.15);
            padding: 40px;
            border-radius: 15px;
            width: 450px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
        h1 {
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: bold;
        }
        input[type="file"] {
            margin: 20px 0;
        }
        button {
            background-color: #00ff9d;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: white;
            color: #6a11cb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Face Recognition System using RAG</h1>

        <form action="/identify" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required><br><br>
            <button type="submit">Identify Person</button>
        </form>
    </div>
</body>
</html>
